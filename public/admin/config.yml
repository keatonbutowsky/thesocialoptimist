# Sveltia CMS configuration for The Social Optimist portfolio.
# Edits made through /admin commit directly to GitHub and trigger a Vercel deploy.
# Docs: https://github.com/sveltia/sveltia-cms

# DecapBridge PKCE auth (handles GitHub OAuth on our behalf).
# Site ID below is unique to the TSO DecapBridge project — do not change.
backend:
  name: git-gateway
  repo: keatonbutowsky/thesocialoptimist
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/3768a2d4-8693-45a5-a4f7-a62346ccf748/pkce
  auth_token_endpoint: /sites/3768a2d4-8693-45a5-a4f7-a62346ccf748/token
  gateway_url: https://gateway.decapbridge.com

# PKCE auth claims (so commits show who edited what).
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Commit messages that record which editor made each change.
commit_messages:
  create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

site_url: https://thesocialoptimist.com
display_url: https://thesocialoptimist.com
logo_url: /brand/tso-wordmark.svg

media_folder: public/videos
public_folder: /videos

collections:
  - name: gallery
    label: Portfolio
    label_singular: Gallery
    delete: false
    files:
      - file: content/gallery.json
        label: Portfolio Videos
        name: gallery
        description: >-
          Edit your portfolio here. Changes go live in about 30 seconds after
          you click "Save & Publish".
        fields:
          - name: sections
            label: Category pages
            label_singular: Category name
            hint: >-
              Each name here becomes a page at /portfolio/<name>. Add a new
              name to create a new category page on the site.
            widget: list
            min: 1
            field:
              { name: name, label: Name, widget: string }

          - name: items
            label: Videos
            label_singular: Video
            widget: list
            summary: "{{fields.clientType}} · {{fields.contentType}}  [{{fields.section}}]"
            fields:
              - name: section
                label: Which category page
                widget: string
                hint: >-
                  Must exactly match a name in "Category pages" above
                  (case-sensitive).

              - name: clientType
                label: Top label (brand / client name)
                widget: string
                hint: 'The first line shown under the video, e.g. "Wedding".'

              - name: contentType
                label: Bottom label (content type)
                widget: string
                hint: 'Examples: "UGC", "Recap Reel", "Founder POV"'

              - name: platform
                label: Platform
                widget: select
                options: ["Instagram", "TikTok"]
                default: Instagram

              - name: src
                label: Video file (.mp4)
                widget: file
                media_library:
                  config:
                    multiple: false
                hint: Upload a new .mp4 here or pick one already in /public/videos.

              - name: poster
                label: Poster image (optional)
                widget: image
                required: false
                hint: >-
                  A thumbnail (.jpg) shown before the video plays. Recommended:
                  1080×1920 for vertical clips.

              - name: aspect
                label: Aspect ratio (optional)
                widget: select
                options: ["9:16", "1:1", "16:9"]
                default: "9:16"
                required: false
